<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" shape-rendering="crispEdges">

  <!-- Shield background -->
  <path d="M16 2 L28 6.5 L28 16.5 C28 22.8 22.8 28.2 16 30.5 C9.2 28.2 4 22.8 4 16.5 L4 6.5 Z"
        fill="#0A1F44"/>

  <!-- Shield inner highlight border -->
  <path d="M16 4.2 L26.2 8.2 L26.2 16.5 C26.2 21.8 21.8 26.6 16 28.6 C10.2 26.6 5.8 21.8 5.8 16.5 L5.8 8.2 Z"
        fill="none" stroke="#C9A84C" stroke-width="0.6" opacity="0.5"/>

  <!-- Balance scale beam (horizontal bar) -->
  <rect x="9.5" y="13.5" width="13" height="1.2" rx="0.6" fill="#C9A84C"/>

  <!-- Scale center post -->
  <rect x="15.4" y="13.5" width="1.2" height="6.5" rx="0.6" fill="#C9A84C"/>

  <!-- Scale base -->
  <rect x="12" y="20" width="8" height="1.1" rx="0.55" fill="#C9A84C"/>
  <rect x="14.5" y="21.1" width="3" height="0.9" rx="0.4" fill="#C9A84C"/>

  <!-- Left pan string -->
  <line x1="10.1" y1="14.7" x2="9.2" y2="17.2" stroke="#C9A84C" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="10.1" y1="14.7" x2="11.0" y2="17.2" stroke="#C9A84C" stroke-width="0.7" stroke-linecap="round"/>

  <!-- Right pan string -->
  <line x1="21.9" y1="14.7" x2="21.0" y2="17.2" stroke="#C9A84C" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="21.9" y1="14.7" x2="22.8" y2="17.2" stroke="#C9A84C" stroke-width="0.7" stroke-linecap="round"/>

  <!-- Left pan -->
  <path d="M8.5 17.2 Q10.1 18.6 11.7 17.2" stroke="#C9A84C" stroke-width="0.8" stroke-linecap="round" fill="none"/>

  <!-- Right pan -->
  <path d="M20.3 17.2 Q21.9 18.6 23.5 17.2" stroke="#C9A84C" stroke-width="0.8" stroke-linecap="round" fill="none"/>

  <!-- Top pivot dot -->
  <circle cx="16" cy="13.2" r="1.1" fill="#C9A84C"/>

</svg>
